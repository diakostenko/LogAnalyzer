<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>История — Log Analyzer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.2.0/dist/tabler-icons.min.css" rel="stylesheet" />
  <link href="css/style.css" rel="stylesheet" />
</head>
<body class="bg-dark text-light min-vh-100">

  <nav class="navbar navbar-dark bg-dark border-bottom border-secondary">
    <div class="container-fluid px-4">
      <a href="index.html" class="navbar-brand fw-semibold d-flex align-items-center gap-2">
        <i class="ti ti-file-analytics fs-5 text-primary"></i>
        Log Analyzer
      </a>
      <a href="index.html" class="btn btn-primary btn-sm">
        <i class="ti ti-upload me-1"></i>Загрузить файл
      </a>
    </div>
  </nav>

  <div class="container-fluid px-4 py-4" style="max-width:900px;">
    <h5 class="mb-4 fw-semibold">
      <i class="ti ti-history me-2 text-secondary"></i>История анализов
    </h5>

    <div id="loadingState" class="text-center py-5">
      <div class="spinner-border text-primary mb-3"></div>
      <p class="text-secondary">Загружаем историю...</p>
    </div>

    <div id="emptyState" class="d-none text-center py-5">
      <i class="ti ti-inbox fs-1 text-secondary mb-3 d-block"></i>
      <h6>Пока нет анализов</h6>
      <p class="text-secondary small">Загрузи первый лог-файл — он появится здесь.</p>
      <a href="index.html" class="btn btn-primary btn-sm mt-2">
        <i class="ti ti-upload me-1"></i>Загрузить файл
      </a>
    </div>

    <div id="historyList" class="d-none">
      <div class="list-group list-group-flush" id="historyItems"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/history.js"></script>
</body>
</html>
